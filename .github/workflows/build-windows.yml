name: Build Windows installer

# Builds the self-contained Windows app and a single-file installer. Run it
# manually from the Actions tab (workflow_dispatch) or by pushing a v* tag; the
# installer is uploaded as a downloadable artifact (and attached to the release
# when triggered by a tag). Nothing needs to be installed locally.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the app and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Freeze the app (PyInstaller, one-folder)
        run: pyinstaller --noconfirm packaging/cclc.spec

      - name: Build the installer (Inno Setup)
        shell: pwsh
        run: |
          # Inno Setup is preinstalled on the windows runner; ensure it's present
          # (a no-op when already installed) and then locate the compiler robustly.
          choco install innosetup --no-progress -y 2>&1 | Out-Host
          $iscc = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source
          if (-not $iscc) {
            foreach ($p in @(
                "${Env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
                "${Env:ProgramFiles}\Inno Setup 6\ISCC.exe")) {
              if (Test-Path $p) { $iscc = $p; break }
            }
          }
          if (-not $iscc) { throw "ISCC.exe (Inno Setup compiler) not found" }
          Write-Host "Using $iscc"
          & $iscc packaging\installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ELAN-Corpus-Label-Comparer-Setup
          path: dist-installer/*.exe

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: ELAN-Corpus-Label-Comparer-portable
          path: dist/ELAN Corpus Label Comparer

      - name: Attach installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-installer/*.exe
